name: Build and Push to Aliyun ACR

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  REGISTRY: crpi-m3p093ympblboqaw.cn-shanghai.personal.cr.aliyuncs.com
  IMAGE_TAG: candy_0/ancient-ocr:v1.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Alibaba Cloud ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login --username "${{ secrets.ACR_USERNAME }}" --password-stdin ${{ env.REGISTRY }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_TAG }}
