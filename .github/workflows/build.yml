name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 配置阿里云镜像加速器（解决 Docker Hub 拉取限制）
      - name: Configure Alibaba Cloud Registry Mirror
        run: |
          sudo mkdir -p /etc/docker
          echo '{"registry-mirrors": ["https://97fyqxem.mirror.aliyuncs.com"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker || sudo service docker restart
          sleep 10

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: "${{ secrets.ALIYUN_PASSWORD }}"

      - name: Build and push
        run: |
          docker build -t ${{ secrets.ALIYUN_REGISTRY }}/candy_0/ancient-ocr:v1.0 .
          docker push ${{ secrets.ALIYUN_REGISTRY }}/candy_0/ancient-ocr:v1.0
