name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          driver-opts: network=host

      - name: Configure Docker Accelerator
        run: |
          sudo mkdir -p /etc/docker
          echo '{"registry-mirrors": ["https://1555443254741608.mirror.aliyuncs.com"]}' | sudo tee /etc/docker/daemon.json
          sudo service docker restart

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: "${{ secrets.ALIYUN_PASSWORD }}"

      - name: Build and push
        run: |
          docker build -t ${{ secrets.ALIYUN_REGISTRY }}/candy_0/ancient-ocr:v1.0 .
          docker push ${{ secrets.ALIYUN_REGISTRY }}/candy_0/ancient-ocr:v1.0
